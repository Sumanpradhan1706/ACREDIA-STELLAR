name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smart-contracts:
    name: Soroban Contract Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./contracts

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Rust Toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustup default stable
          rustup target add wasm32v1-none

      - name: Cache Cargo Dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            contracts/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.toml', 'contracts/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check Formatting
        run: cargo fmt -- --check

      - name: Run Contract Tests
        run: cargo test --lib

      - name: Run Clippy Linter
        run: cargo clippy --target wasm32v1-none

      - name: Compile to optimized WASM
        run: cargo build --target wasm32v1-none --release

  frontend:
    name: Frontend Tests & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Vitest Unit Tests
        run: npm test

      - name: Run ESLint
        run: npm run lint

      - name: Run Next.js Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder"
          SUPABASE_SERVICE_ROLE_KEY: "placeholder-service-role-key"
          NEXT_PUBLIC_CREDENTIAL_NFT_CONTRACT: "CCGDFDLPELTOWG5H5OA4MBR5OZWDP4XJI3S3TQZVZ7XTVP77EKOFORYF"
          NEXT_PUBLIC_CREDENTIAL_REGISTRY_CONTRACT: "CCGDFDLPELTOWG5H5OA4MBR5OZWDP4XJI3S3TQZVZ7XTVP77EKOFORYF"
          NEXT_PUBLIC_CHAIN_ID: "testnet"
          NEXT_PUBLIC_NETWORK_NAME: "testnet"
          NEXT_PUBLIC_HORIZON_URL: "https://horizon-testnet.stellar.org"
          NEXT_PUBLIC_SOROBAN_RPC_URL: "https://soroban-testnet.stellar.org"
          NEXT_PUBLIC_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
          PINATA_JWT: "placeholder-pinata-jwt"
          NEXT_PUBLIC_PINATA_GATEWAY: "https://gateway.pinata.cloud"
          NEXT_PUBLIC_ENABLE_DEBUG_LOGS: "false"
