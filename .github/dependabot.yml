version: 2

updates:
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend
    groups:
      frontend-production:
        patterns:
          - "*"
        dependency-type: production
      frontend-development:
        patterns:
          - "*"
        dependency-type: development

  - package-ecosystem: cargo
    directory: /contracts
    schedule:
      interval: weekly
      day: monday
      time: "04:15"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - smart-contract

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:30"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
